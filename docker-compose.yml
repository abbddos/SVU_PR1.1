version: '3.8'

services:
  # --- BACKEND SERVICE (Flask + Gunicorn) ---
  backend:
    build:
      context: ./backend # Path to your backend directory containing its Dockerfile
    container_name: braves-backend
    restart: always
    environment:
      - FLASK_ENV=production
    volumes:
      # Named volume to persist the SQLite database file outside the container
      - braves_db_data:/home/braves/app/instance
    # Port 5000 is internal to the docker network; Nginx communicates with it directly

  # --- FRONTEND SERVICE (Next.js) ---
  frontend:
    build:
      context: ./frontend # Path to your frontend directory containing its Dockerfile
    container_name: braves-frontend
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  # --- REVERSE PROXY SERVICE (Nginx) ---
  nginx:
    image: nginx:alpine
    container_name: braves-nginx
    restart: always
    ports:
      - "80:80" # Exposes your application to the outside world on standard HTTP port 80
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  braves_db_data: # Declares the persistent SQLite database storage volume